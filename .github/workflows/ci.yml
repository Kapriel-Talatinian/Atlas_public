name: atlas-ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: atlas-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend-build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore Atlas.sln
      - name: Build
        run: dotnet build Atlas.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test Atlas.sln --configuration Release --no-build --verbosity normal

  frontend:
    name: frontend-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

  api-smoke:
    name: api-smoke-tests
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Start API
        run: |
          nohup dotnet run --project src/Atlas.Api --urls http://127.0.0.1:5099 > api.log 2>&1 &
          echo $! > api.pid
      - name: Wait API
        run: |
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:5099/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"
          cat api.log || true
          exit 1
      - name: Smoke checks
        run: |
          curl -fsS http://127.0.0.1:5099/health > /dev/null
          curl -fsS http://127.0.0.1:5099/api/system/health > /dev/null
          curl -fsS http://127.0.0.1:5099/api/system/slo > /dev/null
          curl -fsS http://127.0.0.1:5099/api/trading/limits > /dev/null
      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill "$(cat api.pid)" || true
          fi
      - name: Upload API log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-smoke-log
          path: api.log

  deploy-gate:
    name: deploy-gate
    runs-on: ubuntu-latest
    needs: [backend, frontend, api-smoke]
    steps:
      - name: Deployment gate
        run: echo "All checks passed. Safe for zero-downtime deploy strategy (blue/green or rolling)."
